<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Training Video</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 900px;
        background: #fff;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        text-align: center;
        animation: fadeIn 0.8s ease;
      }

      h1 {
        margin-bottom: 20px;
        color: #333;
      }

      iframe {
        width: 100%;
        aspect-ratio: 16/9;
        border: none;
        border-radius: 12px;
      }

      /* IMAGE SECTION */
      .image-section {
        margin-top: 25px;
      }

      .image-section img {
        width: 100%;
        max-width: 800px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        transition: transform 0.3s ease;
      }

      .image-section img:hover {
        transform: scale(1.02);
      }

      .button-group {
        margin-top: 25px;
      }

      .next-btn {
        display: inline-block;
        padding: 12px 24px;
        background: #0078d4;
        color: #fff;
        text-decoration: none;
        border-radius: 8px;
        transition: 0.3s;
        font-weight: bold;
      }

      .next-btn:hover {
        background: #005ea6;
        transform: translateY(-3px);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Please Watch Carefully</h1>

      <iframe
        width="560"
        height="315"
        src="https://www.youtube.com/embed/qsJkFb7UW_g?si=Fn-qOhSDCCcVaW-o"
        title="YouTube video player"
        frameborder="0"
        allow="
          accelerometer;
          autoplay;
          clipboard-write;
          encrypted-media;
          gyroscope;
          picture-in-picture;
          web-share;
        "
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>

      <!-- IMAGE SECTION -->
      <div class="image-section">
        <img src="image1.jpg" alt="Training Image" />
      </div>

      <div class="button-group">
        <a href="ydt2.html" class="next-btn"> Next Page → </a>
      </div>
    </div>
  </body>
</html>
