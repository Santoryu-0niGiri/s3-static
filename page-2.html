<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Page</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 900px;
        background: #fff;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        text-align: center;
        animation: fadeIn 0.8s ease;
      }

      h1 {
        margin-bottom: 20px;
        color: #333;
      }

      .image-container {
        overflow: hidden;
        border-radius: 12px;
      }

      .image-container img {
        width: 100%;
        display: block;
        border-radius: 12px;
        transition: transform 0.4s ease;
      }

      .image-container img:hover {
        transform: scale(1.03);
      }

      .button-group {
        margin-top: 25px;
      }

      .btn {
        display: inline-block;
        padding: 12px 24px;
        background: #0078d4;
        color: #fff;
        text-decoration: none;
        border-radius: 8px;
        transition: 0.3s;
        font-weight: bold;
      }

      .btn:hover {
        background: #005ea6;
        transform: translateY(-3px);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Hello guys</h1>

      <div class="image-container">
        <img src="monkey.jpg" alt="Presentation Image" />
      </div>

      <div class="button-group">
        <a href="index.html" class="btn"> ← Back to Video </a>
      </div>
    </div>
  </body>
</html>
